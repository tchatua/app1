<!-- 
    This web app is a lightweight diagnostic and version‑tracking page that shows:
        VM hostname
        VM internal IP
        Application version
        Environment label
        Version‑specific background color

    It’s perfect for:
        Testing GCE startup scripts
        Verifying MIG rolling updates
        Checking load balancer traffic distribution
        Demonstrating IaC deployments


<!DOCTYPE html>
<html>
<body style="background-color:rgb(144, 238, 144);">
    <h1>V2 - Welcome to StackSimplify - WebVM App1</h1>
    <p><strong>VM Hostname:</strong> $(hostname)</p>
    <p><strong>VM IP Address:</strong> $(hostname -I)</p>
    <p><strong>Application Version:</strong> V2</p>
    <p>Google Cloud Platform - Demos</p>
</body>
</html>

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tchatua Lab — App1 (V2)</title>
    <style>
        body {
            background-color: rgb(144, 238, 144);
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #2d2d2d;
            font-size: 28px;
        }
        p {
            font-size: 18px;
            color: #333;
            margin: 10px 0;
        }
        .label {
            font-weight: bold;
            color: #111;
        }
        .footer {
            margin-top: 25px;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>V1 — Tchatua Lab WebVM (App1)</h1>

        <p><span class="label">VM Hostname:</span> __HOSTNAME__</p>
        <p><span class="label">VM IP Address:</span> __IPADDR__</p>
        <p><span class="label">Application Version:</span> V1</p>



        <div class="footer">Google Cloud Platform — Dev Environment</div>
    </div>
</body>
</html>
